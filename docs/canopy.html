<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canopy — canopy-code orbital view</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06080c;
    color: #c9d1d9;
    font-family: monospace;
    min-height: 100vh;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 6px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #e6edf3;
    letter-spacing: -0.5px;
  }

  .header .badge {
    background: #1a1f2b;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 11px;
    color: #7d8590;
  }

  .subtitle {
    font-size: 12px;
    color: #484f58;
    margin-bottom: 24px;
    letter-spacing: 0.5px;
  }

  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #7d8590;
  }

  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  .legend-swatch.healthy { background: radial-gradient(circle at 40% 35%, #56d364, #1a7f37); }
  .legend-swatch.moderate { background: radial-gradient(circle at 40% 35%, #e3b341, #9e6a03); }
  .legend-swatch.complex { background: radial-gradient(circle at 40% 35%, #f85149, #b62324); }
  .legend-swatch.dead { background: #484f58; opacity: 0.5; }
  .legend-swatch.churn {
    background: transparent;
    border: 2px solid #bc8cff;
    box-shadow: 0 0 4px rgba(188,140,255,0.4);
  }
  .legend-swatch.dep {
    width: 20px;
    height: 2px;
    border-radius: 1px;
    background: linear-gradient(90deg, #21262d, #58a6ff);
  }

  .orbital-container {
    position: relative;
    background: radial-gradient(ellipse at center, #0d1117 0%, #080b10 50%, #06080c 100%);
    border: 1px solid #21262d;
    border-radius: 12px;
    overflow: hidden;
    cursor: grab;
  }

  .orbital-container:active {
    cursor: grabbing;
  }

  #canvas svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  [data-module] {
    cursor: pointer;
    transition: filter 0.2s ease;
  }

  [data-module]:hover {
    filter: brightness(1.5) drop-shadow(0 0 12px rgba(255,255,255,0.2));
  }

  .tooltip {
    position: fixed;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    font-family: monospace;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 100;
    min-width: 220px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  }

  .tooltip.visible { opacity: 1; }
  .tooltip .tt-name { font-weight: 600; color: #e6edf3; font-size: 13px; margin-bottom: 4px; }
  .tooltip .tt-desc { color: #58a6ff; font-size: 10px; margin-bottom: 8px; }
  .tooltip .tt-row { display: flex; justify-content: space-between; gap: 24px; padding: 2px 0; color: #7d8590; }
  .tooltip .tt-row .tt-val { color: #c9d1d9; font-weight: 500; }
  .tooltip .tt-bar { height: 3px; background: #21262d; border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .tooltip .tt-bar-fill { height: 100%; border-radius: 2px; }

  .stats-bar {
    display: flex;
    gap: 32px;
    margin-top: 20px;
    padding: 16px 20px;
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 8px;
    flex-wrap: wrap;
  }

  .stat { display: flex; flex-direction: column; gap: 4px; }
  .stat-value { font-size: 18px; font-weight: 600; color: #e6edf3; }
  .stat-label { font-size: 10px; color: #484f58; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value.green { color: #2ea043; }
  .stat-value.yellow { color: #d29922; }
  .stat-value.red { color: #da3633; }
</style>

<script>
const DATA = {
  "project_name": "canopy-code",
  "modules": {
    "canopy": {
      "lines": 1,
      "funcs": 0,
      "mi": 100.0,
      "cc": 0.0,
      "dead": 0,
      "churn": 1,
      "layer": "Uncategorized",
      "desc": ""
    },
    "canopy.aggregator": {
      "lines": 224,
      "funcs": 0,
      "mi": 100.0,
      "cc": 0.0,
      "dead": 0,
      "churn": 1,
      "layer": "Uncategorized",
      "desc": ""
    },
    "canopy.cli": {
      "lines": 110,
      "funcs": 0,
      "mi": 100.0,
      "cc": 0.0,
      "dead": 0,
      "churn": 2,
      "layer": "Core",
      "desc": ""
    },
    "canopy.config": {
      "lines": 159,
      "funcs": 0,
      "mi": 100.0,
      "cc": 0.0,
      "dead": 2,
      "churn": 1,
      "layer": "Core",
      "desc": ""
    },
    "canopy.exceptions": {
      "lines": 18,
      "funcs": 0,
      "mi": 100.0,
      "cc": 0.0,
      "dead": 2,
      "churn": 1,
      "layer": "Core",
      "desc": ""
    },
    "canopy.models": {
      "lines": 59,
      "funcs": 0,
      "mi": 100.0,
      "cc": 0.0,
      "dead": 0,
      "churn": 2,
      "layer": "Core",
      "desc": ""
    },
    "canopy.collectors": {
      "lines": 407,
      "funcs": 0,
      "mi": 100.0,
      "cc": 0.0,
      "dead": 6,
      "churn": 6,
      "layer": "Collectors",
      "desc": ""
    },
    "canopy.layout": {
      "lines": 305,
      "funcs": 0,
      "mi": 100.0,
      "cc": 0.0,
      "dead": 0,
      "churn": 6,
      "layer": "Layout",
      "desc": ""
    },
    "canopy.render": {
      "lines": 1085,
      "funcs": 0,
      "mi": 100.0,
      "cc": 0.0,
      "dead": 1,
      "churn": 7,
      "layer": "Render",
      "desc": ""
    }
  }
};

// --- Tooltip ---
const tooltip = document.getElementById('tooltip');
const svgEl = document.querySelector('#canvas svg');
let pinned = null;

svgEl.addEventListener('mousemove', function(e) {
  if (pinned) return;
  var g = e.target.closest('[data-module]');
  if (!g) { tooltip.classList.remove('visible'); return; }
  showTooltip(g.dataset.module, e.clientX, e.clientY);
});

svgEl.addEventListener('mouseleave', function() {
  if (!pinned) tooltip.classList.remove('visible');
});

svgEl.addEventListener('click', function(e) {
  var g = e.target.closest('[data-module]');
  if (!g) { pinned = null; tooltip.classList.remove('visible'); return; }
  if (pinned === g.dataset.module) { pinned = null; tooltip.classList.remove('visible'); return; }
  pinned = g.dataset.module;
  showTooltip(g.dataset.module, e.clientX, e.clientY);
});

function showTooltip(name, cx, cy) {
  var m = DATA.modules[name];
  if (!m) return;
  document.getElementById('tt-name').textContent = DATA.project_name + '/' + name;
  document.getElementById('tt-desc').textContent = m.desc || '';
  document.getElementById('tt-lines').textContent = m.lines.toLocaleString();
  document.getElementById('tt-funcs').textContent = m.funcs;
  document.getElementById('tt-mi').textContent = m.mi + '/100';
  document.getElementById('tt-cc').textContent = m.cc;
  document.getElementById('tt-dead').textContent = m.dead > 0 ? m.dead + ' functions' : 'None';
  document.getElementById('tt-churn').textContent = m.churn + ' commits';
  document.getElementById('tt-layer').textContent = m.layer;

  var bar = document.getElementById('tt-bar');
  bar.style.width = m.mi + '%';
  bar.style.background = m.mi >= 40 ? '#2ea043' : m.mi >= 20 ? '#d29922' : '#da3633';

  tooltip.classList.add('visible');
  var left = cx + 16;
  var top = cy - 16;
  if (left + 240 > window.innerWidth) left = cx - 240;
  if (top + 200 > window.innerHeight) top = cy - 200;
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

// --- Zoom & Pan ---
var viewBox = svgEl.viewBox.baseVal;
var isPanning = false;
var startPoint = { x: 0, y: 0 };
var startViewBox = { x: 0, y: 0 };

var container = document.getElementById('canvas');

container.addEventListener('wheel', function(e) {
  e.preventDefault();
  var scale = e.deltaY > 0 ? 1.1 : 0.9;
  var rect = svgEl.getBoundingClientRect();
  var mx = (e.clientX - rect.left) / rect.width;
  var my = (e.clientY - rect.top) / rect.height;

  var newW = viewBox.width * scale;
  var newH = viewBox.height * scale;
  viewBox.x += (viewBox.width - newW) * mx;
  viewBox.y += (viewBox.height - newH) * my;
  viewBox.width = newW;
  viewBox.height = newH;
}, { passive: false });

container.addEventListener('mousedown', function(e) {
  if (e.button !== 0) return;
  isPanning = true;
  startPoint = { x: e.clientX, y: e.clientY };
  startViewBox = { x: viewBox.x, y: viewBox.y };
});

window.addEventListener('mousemove', function(e) {
  if (!isPanning) return;
  var rect = svgEl.getBoundingClientRect();
  var dx = (e.clientX - startPoint.x) / rect.width * viewBox.width;
  var dy = (e.clientY - startPoint.y) / rect.height * viewBox.height;
  viewBox.x = startViewBox.x - dx;
  viewBox.y = startViewBox.y - dy;
});

window.addEventListener('mouseup', function() {
  isPanning = false;
});
</script>
